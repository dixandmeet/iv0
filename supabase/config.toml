# Configuration Supabase — Aule
# ---------------------------------------------------------------------------
# Les modèles d'e-mail Auth sont dans ./templates/ (français).
# En local : supabase stop && supabase start pour recharger.
# En production : copier sujet + corps HTML dans
#   Dashboard → Authentication → Email Templates
# ---------------------------------------------------------------------------

project_id = "aule"

[auth]
enabled = true
site_url = "https://aule.app"
additional_redirect_urls = [
  "https://aule.app/**",
  "io.aule.app://login-callback/",
  "io.aule.pro://login-callback/",
  "http://localhost:3000/**",
  "http://localhost:3001/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Confirmez votre adresse e-mail — Aule"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.invite]
subject = "Invitation à rejoindre Aule"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Réinitialisation de votre mot de passe — Aule"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Votre lien de connexion — Aule"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirmez votre nouvelle adresse e-mail — Aule"
content_path = "./supabase/templates/email_change.html"

[inbucket]
enabled = true
