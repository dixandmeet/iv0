name: aule
description: GPS communautaire pour les transports en commun à Nantes (Naolib) - MVP.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.6.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  shared_preferences: ^2.2.0
  uuid: ^4.3.3
  provider: ^6.1.2
  intl: ^0.19.0
  lucide_icons_flutter: ^3.1.14+2
  http: ^1.6.0
  shared:
    path: packages/shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/tan_stops.json
    - assets/data/tan_stations.json
    - assets/data/tan_routes.json
    - assets/data/naolib_schedules.json
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800
    - family: Hanken Grotesk
      fonts:
        # Police variable (axe wght 100–900) : Flutter mappe automatiquement
        # TextStyle.fontWeight sur l'axe wght, donc un seul fichier suffit.
        - asset: assets/fonts/HankenGrotesk-Variable.ttf
